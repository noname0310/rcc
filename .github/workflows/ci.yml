name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (no-llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - run: cargo test --workspace

  test-llvm:
    name: test (llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y llvm-18-dev libpolly-18-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
      - run: cargo test --workspace --features rcc_codegen_llvm/llvm

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: lcov.info

  fuzz-smoke:
    name: fuzz smoke (lexer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: Swatinem/rust-cache@v2
      - name: Run 30s fuzz smoke test
        run: |
          if [ -d fuzz ]; then
            cd fuzz
            cargo +nightly fuzz run lex --target x86_64-unknown-linux-gnu -- -max_total_time=30
          else
            echo "fuzz directory not present yet; skipping"
          fi

  conformance:
    name: conformance (c-testsuite + chibicc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - name: Build rcc
        run: cargo build --release --bin rcc
      - name: Run conformance
        run: |
          cargo run --release --package rcc_conformance --bin rcc_conformance_run -- \
            --rcc target/release/rcc \
            --suite c-testsuite \
            --suite chibicc
      - name: Check KPI thresholds
        run: python3 scripts/ci/check_kpi.py
      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: docs/conformance.json

  gcc-torture-smoke:
    name: gcc-torture smoke (GPL, manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y llvm-18-dev libpolly-18-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
      - name: Fetch gcc-torture (GPL gated)
        run: cargo xtask fetch-testsuites --include-gpl --only gcc-torture
      - name: Build rcc with LLVM
        run: cargo build --release -p rcc_driver --features rcc_codegen_llvm/llvm
      - name: Run gcc-torture smoke subset
        run: |
          cargo run --release --package rcc_conformance --bin rcc_conformance_run -- \
            --rcc target/release/rcc \
            --include-gpl \
            --suite gcc-torture \
            --mode smoke \
            --output docs/gcc-torture-smoke.json
      - name: Upload gcc-torture smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcc-torture-smoke-report
          path: docs/gcc-torture-smoke.json

  llvm-test-suite:
    name: llvm-test-suite SingleSource (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y llvm-18-dev libpolly-18-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
      - name: Fetch llvm-test-suite
        run: cargo xtask fetch-testsuites --only llvm-test-suite
      - name: Build rcc with LLVM
        run: cargo build --release -p rcc_driver --features rcc_codegen_llvm/llvm
      - name: Run llvm-test-suite SingleSource subset
        run: |
          cargo run --release --package rcc_conformance --bin rcc_conformance_run -- \
            --rcc target/release/rcc \
            --suite llvm-test-suite \
            --output docs/llvm-test-suite.json
      - name: Check llvm-test-suite subset
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("docs/llvm-test-suite.json").read_text())
          suite = next(s for s in report["suites"] if s["name"] == "llvm-test-suite")
          cases = suite["cases"]
          fail = [name for name, case in cases.items() if case["status"] == "fail"]
          print(f"llvm-test-suite subset: {len(cases) - len(fail)} pass / {len(fail)} fail")
          if fail:
              raise SystemExit("llvm-test-suite subset failures: " + ", ".join(fail))
          PY
      - name: Upload llvm-test-suite report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-test-suite-report
          path: docs/llvm-test-suite.json

  gcc-torture-full:
    name: gcc-torture execute (GPL, manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y llvm-18-dev libpolly-18-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
      - name: Fetch gcc-torture (GPL gated)
        run: cargo xtask fetch-testsuites --include-gpl --only gcc-torture
      - name: Build rcc with LLVM
        run: cargo build --release -p rcc_driver --features rcc_codegen_llvm/llvm
      - name: Run gcc-torture execute suite
        run: |
          cargo run --release --package rcc_conformance --bin rcc_conformance_run -- \
            --rcc target/release/rcc \
            --include-gpl \
            --suite gcc-torture \
            --output docs/gcc-torture-full.json
      - name: Check gcc-torture execute KPI
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("docs/gcc-torture-full.json").read_text())
          suite = next(s for s in report["suites"] if s["name"] == "gcc-torture")
          cases = suite["cases"]
          passing = sum(1 for c in cases.values() if c["status"] in ("pass", "xfail"))
          rate = passing / len(cases)
          print(f"gcc-torture execute pass_rate={rate:.3f} ({passing}/{len(cases)})")
          if rate < 0.60:
              raise SystemExit("gcc-torture execute pass_rate below 0.600")
          PY
      - name: Upload gcc-torture full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcc-torture-full-report
          path: docs/gcc-torture-full.json

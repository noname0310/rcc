name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (no-llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - run: cargo test --workspace

  test-llvm:
    name: test (llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y llvm-18-dev libpolly-18-dev
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
      - run: cargo test --workspace --features rcc_codegen_llvm/llvm

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: lcov.info

  fuzz-smoke:
    name: fuzz smoke (lexer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: Swatinem/rust-cache@v2
      - name: Run 30s fuzz smoke test
        run: |
          if [ -d fuzz ]; then
            cd fuzz
            cargo +nightly fuzz run lex --target x86_64-unknown-linux-gnu -- -max_total_time=30
          else
            echo "fuzz directory not present yet; skipping"
          fi

  conformance:
    name: conformance (c-testsuite + chibicc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch test suites (permissive only)
        run: cargo xtask fetch-testsuites
      - name: Build rcc
        run: cargo build --release --bin rcc
      - name: Run conformance
        run: |
          cargo run --release --package rcc_conformance --bin rcc_conformance_run -- \
            --rcc target/release/rcc \
            --suite c-testsuite \
            --suite chibicc
      - name: Check KPI thresholds
        run: python3 scripts/ci/check_kpi.py
      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: docs/conformance.json

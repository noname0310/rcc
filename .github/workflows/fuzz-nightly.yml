name: Fuzz Nightly

on:
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "libFuzzer seconds per shard"
        required: false
        default: "21300"
      max_len:
        description: "Maximum generated input length"
        required: false
        default: "131072"
  schedule:
    - cron: "43 17 * * *"

concurrency:
  group: fuzz-nightly-lex
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FUZZ_MAX_TOTAL_TIME: ${{ inputs.max_total_time || '21300' }}
  FUZZ_MAX_LEN: ${{ inputs.max_len || '131072' }}

jobs:
  lex:
    name: lex shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        # GitHub-hosted runners cap one job at 6 h, so this matrix supplies a
        # 24 h-class aggregate budget while keeping each shard inside the cap.
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            fuzz -> fuzz/target

      - name: Run lex fuzzer shard
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          mkdir -p "fuzz/artifacts/lex/shard-${SHARD}"
          cd fuzz
          cargo +nightly fuzz run lex --target x86_64-unknown-linux-gnu -- \
            -max_total_time="${FUZZ_MAX_TOTAL_TIME}" \
            -max_len="${FUZZ_MAX_LEN}" \
            -rss_limit_mb=4096 \
            -seed="$((100000 + SHARD))" \
            -artifact_prefix="artifacts/lex/shard-${SHARD}/" \
            -print_final_stats=1

      - name: Upload lex corpus and crashes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lex-fuzz-shard-${{ matrix.shard }}
          path: |
            fuzz/corpus/lex
            fuzz/artifacts/lex/shard-${{ matrix.shard }}
          if-no-files-found: warn
          retention-days: 14

      - name: Notify fuzz failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.FUZZ_ALERT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHARD: ${{ matrix.shard }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ.get("WEBHOOK_URL", "")
          if not webhook:
              print("FUZZ_ALERT_WEBHOOK_URL is not configured; relying on GitHub notifications.")
              raise SystemExit(0)

          payload = {
              "text": (
                  "rcc lex fuzz nightly failed "
                  f"(shard {os.environ['SHARD']}): {os.environ['RUN_URL']}"
              )
          }
          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=15) as resp:
              print(f"fuzz alert webhook returned HTTP {resp.status}")
          PY

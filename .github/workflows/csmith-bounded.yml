name: Csmith Bounded Differential (manual)

on:
  workflow_dispatch:
    inputs:
      max_duration_secs:
        description: "Maximum differential runtime seconds"
        required: false
        default: "1800"
      iterations:
        description: "Hard cap on generated programs"
        required: false
        default: "100000"
      max_source_bytes:
        description: "Maximum generated C source bytes"
        required: false
        default: "10240"

concurrency:
  group: csmith-bounded-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
  CSMITH_MAX_DURATION: ${{ inputs.max_duration_secs || '1800' }}
  CSMITH_ITERATIONS: ${{ inputs.iterations || '100000' }}
  CSMITH_MAX_SOURCE_BYTES: ${{ inputs.max_source_bytes || '10240' }}

jobs:
  csmith:
    name: csmith bounded differential
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM 18 and csmith build tools
        run: |
          set -euo pipefail
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y llvm-18-dev libpolly-18-dev cmake m4

      - name: Fetch csmith
        run: cargo xtask fetch-testsuites --only csmith

      - name: Build csmith
        run: |
          set -euo pipefail
          cmake -S third_party/testsuites/csmith -B third_party/testsuites/csmith/build -DCMAKE_BUILD_TYPE=Release
          cmake --build third_party/testsuites/csmith/build --target csmith --parallel 2

      - name: Build rcc with LLVM
        run: cargo build --release --bin rcc --features rcc_codegen_llvm/llvm

      - name: Run bounded differential
        run: |
          set -euo pipefail
          REPORT_ROOT="reports/csmith/${GITHUB_RUN_ID}"
          mkdir -p "${REPORT_ROOT}"
          cargo run --release --package rcc_conformance --bin rcc_csmith_diff -- \
            --rcc target/release/rcc \
            --host-cc cc \
            --csmith third_party/testsuites/csmith/build/src/csmith \
            --runtime-include third_party/testsuites/csmith/runtime \
            --iterations "${CSMITH_ITERATIONS}" \
            --max-duration-secs "${CSMITH_MAX_DURATION}" \
            --max-source-bytes "${CSMITH_MAX_SOURCE_BYTES}" \
            --work-dir "${REPORT_ROOT}/cases" \
            --output "${REPORT_ROOT}/report.json"

      - name: Upload csmith report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csmith-bounded-report
          path: reports/csmith/${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14

# External C test suites fetched by `cargo xtask fetch-testsuites`.
#
# Every entry is pinned by `rev` (git) or URL (tarball). License columns are
# informational. Entries with `gpl = true` are optional external suites
# fetched only when `cargo xtask fetch-testsuites --include-gpl` is passed.
# CI may download and execute them inside the runner; the opt-in prevents
# accidental heavyweight fetches, not normal test execution.

[[suite]]
name        = "c-testsuite"
description = "Small standalone C programs with .expected stdout; used by cproc/lacc/chibicc"
license     = "MIT"
git         = "https://github.com/c-testsuite/c-testsuite.git"
rev         = "5c7275656d751de0e68b2d340a95b5681858ed07"

[[suite]]
name        = "chibicc"
description = "Rui Ueyama's C compiler's test suite (test/ subtree)"
license     = "MIT"
git         = "https://github.com/rui314/chibicc.git"
rev         = "90d1f7f199cc55b13c7fdb5839d1409806633fdb"
sparse      = ["test", "LICENSE"]

[[suite]]
name        = "gcc-torture"
description = "GCC C torture tests (execute/ + compile/)"
license     = "GPL-3.0-or-later WITH GCC-exception-3.1"
gpl         = true
git         = "https://gcc.gnu.org/git/gcc.git"
rev         = "cd0059a1976303638cea95f216de129334fc04d1"
tag         = "releases/gcc-14.1.0"
sparse      = ["gcc/testsuite/gcc.c-torture", "COPYING3"]

[[suite]]
name        = "tcc-tests2"
description = "Tiny C Compiler tests (tests/tests2)"
license     = "LGPL-2.1"
gpl         = true  # LGPL: gated under the same flag for simplicity
git         = "https://github.com/TinyCC/tinycc.git"
rev         = "d348a9a51d32cece842b7885d27a411436d7887b"
tag         = "release_0_9_27"
sparse      = ["tests/tests2", "COPYING"]

[[suite]]
name        = "llvm-test-suite"
description = "LLVM test-suite (SingleSource/UnitTests subset)"
license     = "Apache-2.0 WITH LLVM-exception"
git         = "https://github.com/llvm/llvm-test-suite.git"
rev         = "ed4e04cb2365f9709ff8a1113b37d481cfeb5e95"
sparse      = ["SingleSource/UnitTests", "LICENSE.TXT", "CMakeLists.txt"]

[[suite]]
name        = "csmith"
description = "Random C program generator; drives differential fuzzing"
license     = "BSD-2-Clause"
git         = "https://github.com/csmith-project/csmith.git"
rev         = "0cdc710315cfee9035e22ef4363ca479270d1934"
